    <main>
        <section class="hero">
            <h1>展会展示</h1>
            <h2>三越参与的重要行业展会</h2>
            <p>江西三越高新材料有限公司积极参与国内外重要行业展会，展示最新产品和技术，与行业伙伴交流合作，不断推动行业发展。</p>
        </section>
        
        <section class="exhibition-list">
            <h2>展会热点</h2>
            <div id="exhibitionContainer">
                <!-- 展会内容将通过JavaScript动态生成 -->
                <div class="loading">加载中...</div>
            </div>
        </section>
        
        <script>
            // 加载展会数据
            function loadExhibitions() {
                fetch('uploads/zhanhui.txt')
                    .then(response => response.text())
                    .then(text => {
                        const container = document.getElementById('exhibitionContainer');
                        const lines = text.trim().split('\n\n');
                        
                        if (lines.length === 0 || (lines.length === 1 && lines[0] === '')) {
                            container.innerHTML = '<p class="no-exhibitions">暂无展会信息</p>';
                            return;
                        }
                        
                        container.innerHTML = '';
                        
                        lines.forEach((line, index) => {
                            const parts = line.split('\n');
                            if (parts.length < 4) return;
                            
                            const name = parts[0];
                            const date = parts[1];
                            const location = parts[2];
                            const description = parts[3];
                            const link = parts[4];
                            const images = parts.slice(5);
                            
                            const exhibitionItem = document.createElement('div');
                            exhibitionItem.className = 'exhibition-item';
                            
                            let imagesHtml = '';
                            if (images && images.length > 0) {
                                imagesHtml = `
                                    <div class="exhibition-gallery">
                                        <div class="gallery-grid">
                                            ${images.map(img => `<img src="${img.startsWith('http') ? img : img==""?img:'Duploads/' + img}" alt="${name}">`).join('')}
                                        </div>
                                    </div>
                                `;
                            }
                            
                            exhibitionItem.innerHTML = `
                                <div class="exhibition-info">
                                    <h3>${name}</h3>
                                    <p class="exhibition-date">时间：${date}</p>
                                    <p class="exhibition-location">地点：${location}</p>
                                    <p>${description}</p>
                                    <p><a href="${link}" target="_blank" style=" text-decoration: none;">查看详情</a></p>
                                    </p>
                                </div>
                                ${imagesHtml}
                            `;
                            
                            container.appendChild(exhibitionItem);
                        });
                    })
                    .catch(error => {
                        console.error('加载展会数据失败:', error);
                        document.getElementById('exhibitionContainer').innerHTML = '<p class="no-exhibitions">加载展会数据失败</p>';
                    });
            }
            
            // 初始化
            window.onload = function() {
                loadExhibitions();
            };
        </script>
        
        <style>
            .loading {
                text-align: center;
                padding: 3rem;
                color: #666;
            }
            
            .no-exhibitions {
                text-align: center;
                padding: 3rem;
                color: #666;
                background-color: #f8f9fa;
                border-radius: 8px;
            }
        </style>
    </main>
